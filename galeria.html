<!doctype html>
<html>
<script>
   window.onscroll = function() {scrollFunction()};

function scrollFunction() {
  if (document.body.scrollTop > 50 || document.documentElement.scrollTop > 50) {
    document.getElementById("nazov").style.fontSize = "40px";

    document.getElementsByTagName("button")[0].style.width = "25%";
    document.getElementsByTagName("button")[1].style.width = "25%";
    document.getElementsByTagName("button")[2].style.width = "25%";

    document.getElementsByTagName("button")[0].style.marginTop = "20px";
    document.getElementsByTagName("button")[1].style.marginTop = "20px";
    document.getElementsByTagName("button")[2].style.marginTop = "20px";


    document.getElementById("header").style.height = "80px";
    document.getElementById("header").style.clipPath = "none";
  } else {
    document.getElementById("nazov").style.fontSize = "9vh";
    document.getElementsByTagName("button")[0].style.width = "32.33%";
    document.getElementsByTagName("button")[1].style.width = "32.33%";
    document.getElementsByTagName("button")[2].style.width = "32.33%";

    document.getElementsByTagName("button")[0].style.margin = "0.85vh";
    document.getElementsByTagName("button")[1].style.margin = "0.85vh";
    document.getElementsByTagName("button")[2].style.margin = "0.85vh";


    document.getElementById("header").style.height = "250px";
    document.getElementById("header").style.clipPath = "polygon(0 0, 100% 0, 100% 80%, 0 calc(100% - 5.5vw)";

  }
}
</script>
